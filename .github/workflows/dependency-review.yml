name: Dependency Review

on:
  pull_request:
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/dependency-review.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9"
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
          license-check: true

      - name: Check for known vulnerabilities
        run: |
          # Create a summary of vulnerable packages
          echo "## Dependency Vulnerability Check" >> $GITHUB_STEP_SUMMARY
          echo "Running pnpm audit to check for vulnerabilities..." >> $GITHUB_STEP_SUMMARY
          pnpm audit --audit-level=high 2>&1 || echo "Audit completed with warnings"
