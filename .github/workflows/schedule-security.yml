name: Weekly Security Scan

on:
  schedule:
    - cron: "0 0 * * 0" # Weekly on Sunday at midnight
  workflow_dispatch:
    inputs:
      scan_type:
        description: "Scan type"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - dependencies
          - codeql

permissions:
  contents: read
  security-events: write

jobs:
  security-scan:
    name: Weekly Security Scan
    runs-on: ubuntu-latest
    if: github.repository == 'chadisfaction/gemcity.xyz'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9"
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Full Dependency Audit
        run: |
          echo "## Dependency Audit" >> $GITHUB_STEP_SUMMARY
          echo "Running comprehensive dependency audit..." >> $GITHUB_STEP_SUMMARY
          pnpm audit --audit-level=moderate 2>&1 | tee audit-full.log || true

      - name: Check for outdated packages
        run: |
          echo "## Outdated Packages" >> $GITHUB_STEP_SUMMARY
          echo "Checking for outdated packages..." >> $GITHUB_STEP_SUMMARY
          pnpm outdated --depth=0 2>&1 | tee outdated.log || true

      - name: Check for license issues
        run: |
          echo "## License Check" >> $GITHUB_STEP_SUMMARY
          echo "Analyzing package licenses..." >> $GITHUB_STEP_SUMMARY

          # Check for problematic licenses
          LICENSES=$(grep -r '"license"' node_modules/*/package.json 2>/dev/null | grep -v "MIT\|Apache\|BSD\|ISC\|Unlicense" | head -20 || true)

          if [ -n "$LICENSES" ]; then
            echo "⚠️ Non-standard licenses detected:" >> $GITHUB_STEP_SUMMARY
            echo "$LICENSES" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ All packages use standard open-source licenses" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for deprecated packages
        run: |
          echo "## Deprecated Packages" >> $GITHUB_STEP_SUMMARY
          echo "Checking for deprecated packages..." >> $GITHUB_STEP_SUMMARY

          # Check for commonly deprecated packages
          DEPRECATED=""
          for pkg in request axios; do
            if grep -q "\"$pkg\"" package.json 2>/dev/null; then
              DEPRECATED="$DEPRECATED\n- $pkg is deprecated or has security concerns"
            fi
          done

          if [ -n "$DEPRECATED" ]; then
            echo "$DEPRECATED" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No obviously deprecated packages detected" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Generate security report
        run: |
          echo "## Weekly Security Report" >> $GITHUB_STEP_SUMMARY
          echo "Generated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Repository: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-security-scan
          path: |
            *.log
          retention-days: 30

  codeql-weekly:
    name: CodeQL Weekly Scan
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9"
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-extended

      - name: Build
        run: pnpm build || true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:typescript"
          upload: true
